<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>✈️ 哩程機位監控</title>
<meta name="theme-color" content="#0d0d10">
<style>
  :root {
    --bg:#0d0d10; --card:#17171c; --border:#2a2a33; --text:#ececf1; --text2:#9a9aa8;
    --accent:#6aa8ff; --ok:#4cc38a; --okbg:#0f2a1e; --dim:#6b6b78; --chip:#22222b;
  }
  * { box-sizing:border-box; }
  body { margin:0; padding:0 12px 60px; background:var(--bg); color:var(--text);
    font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif; line-height:1.5;
    max-width:820px; margin-inline:auto; }
  h1 { font-size:1.35rem; margin:20px 0 2px; }
  .sub { color:var(--text2); font-size:0.85rem; margin:0 0 14px; }
  .summary { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 16px; }
  .stat { background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:8px 14px; font-size:0.9rem; }
  .stat b { font-size:1.15rem; color:var(--accent); }
  .stat.ok b { color:var(--ok); }
  .controls { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 12px; align-items:center; }
  .controls label { font-size:0.85rem; color:var(--text2); display:flex; align-items:center; gap:5px; }
  select { background:var(--bg); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:6px 10px; font-size:0.9rem; }
  .grp { margin:18px 0 6px; font-size:1.02rem; font-weight:700; display:flex; align-items:center; gap:8px; }
  .grp .prog { font-size:0.78rem; color:var(--text2); font-weight:400; }
  table { width:100%; border-collapse:collapse; font-size:0.86rem; }
  thead th { text-align:left; color:var(--text2); font-weight:600; font-size:0.76rem;
    padding:6px 8px; border-bottom:1px solid var(--border); white-space:nowrap; }
  tbody td { padding:8px; border-bottom:1px solid var(--border); vertical-align:top; }
  tr.avail { background:var(--okbg); }
  tr.none td { color:var(--dim); }
  .badge { display:inline-block; padding:1px 8px; border-radius:99px; font-size:0.74rem; font-weight:700; }
  .badge.available { background:var(--ok); color:#06281a; }
  .badge.none { background:var(--chip); color:var(--dim); }
  .badge.check { background:#3a3320; color:#e0a458; }
  .rt { color:var(--ok); font-weight:700; }
  .flt { color:var(--text2); font-size:0.8rem; }
  .msg { color:var(--text2); padding:24px 4px; text-align:center; }
  .foot { color:var(--dim); font-size:0.78rem; margin-top:24px; text-align:center; }
  @media (max-width:560px) {
    thead { display:none; }
    table, tbody, tr, td { display:block; width:100%; }
    tbody tr { border:1px solid var(--border); border-radius:10px; margin:8px 0; padding:4px 2px; }
    tbody td { border:none; padding:3px 10px; }
    tbody td::before { content:attr(data-l)"："; color:var(--text2); font-size:0.76rem; }
    tbody td.main::before { content:""; }
    tbody td.main { font-weight:700; font-size:0.98rem; padding-top:8px; }
  }
</style>
</head>
<body>
<h1>✈️ 哩程機位監控</h1>
<p class="sub" id="sub">載入中…</p>

<div class="summary" id="summary"></div>
<div class="controls">
  <label>航空
    <select id="f-air"><option value="">全部</option></select>
  </label>
  <label>艙等
    <select id="f-cabin"><option value="">全部</option></select>
  </label>
  <label><input type="checkbox" id="f-availonly"> 只看有位</label>
</div>

<div id="list"><p class="msg">載入中…</p></div>
<p class="foot">資料由 1800 上四家航空官網監控每日兩次更新 · 華航 / ANA / 星宇 / 阿拉斯加</p>

<script>
(function () {
  "use strict";
  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function fmtTime(iso){ if(!iso) return "—"; var d=new Date(iso);
    return (d.getMonth()+1)+"/"+d.getDate()+" "+d.getHours()+":"+String(d.getMinutes()).padStart(2,"0"); }
  var STATUS={ available:"有位", none:"無位", check:"待確認" };
  var ALL=[], DATA=null;

  function render(){
    var air=$("f-air").value, cabin=$("f-cabin").value, availOnly=$("f-availonly").checked;
    var rows=ALL.filter(function(r){
      if(air && r.airline!==air) return false;
      if(cabin && (r.cabin||"").indexOf(cabin)<0) return false;
      if(availOnly && r.status!=="available") return false;
      return true;
    });
    var el=$("list");
    if(!rows.length){ el.innerHTML='<p class="msg">目前沒有符合條件的項目。</p>'; return; }
    // group by airline
    var groups={}, order=[];
    rows.forEach(function(r){ if(!groups[r.airline]){ groups[r.airline]=[]; order.push(r.airline); } groups[r.airline].push(r); });
    var html="";
    order.forEach(function(a){
      var g=groups[a], prog=g[0].program||"";
      var navail=g.filter(function(r){return r.status==="available";}).length;
      html+='<div class="grp">'+esc(a)+' <span class="prog">'+esc(prog)+' · 有位 '+navail+'/'+g.length+'</span></div>';
      html+='<table><thead><tr><th>路線</th><th>日期</th><th>艙等</th><th>狀態</th><th>可訂</th><th>哩程</th><th>稅</th><th>航班</th></tr></thead><tbody>';
      g.forEach(function(r){
        var cls=r.status==="available"?"avail":(r.status==="none"?"none":"");
        html+='<tr class="'+cls+'">'
          +'<td class="main" data-l="路線">'+esc(r.route)+'</td>'
          +'<td data-l="日期">'+esc(r.date||"")+'</td>'
          +'<td data-l="艙等">'+esc(r.cabin||"")+'</td>'
          +'<td data-l="狀態"><span class="badge '+esc(r.status)+'">'+(STATUS[r.status]||r.status)+'</span></td>'
          +'<td data-l="可訂" class="'+(r.status==="available"?"rt":"")+'">'+esc(r.avail||"")+'</td>'
          +'<td data-l="哩程">'+esc(r.miles||"")+'</td>'
          +'<td data-l="稅">'+esc(r.tax||"")+'</td>'
          +'<td data-l="航班" class="flt">'+esc(r.flight||"")+'</td>'
          +'</tr>';
      });
      html+='</tbody></table>';
    });
    el.innerHTML=html;
  }

  function fillFilters(){
    var airs=[], cabins=[];
    ALL.forEach(function(r){
      if(airs.indexOf(r.airline)<0) airs.push(r.airline);
      (r.cabin||"").split(/[\/、]/).forEach(function(c){ c=c.trim(); if(c && cabins.indexOf(c)<0) cabins.push(c); });
    });
    airs.forEach(function(a){ var o=document.createElement("option"); o.value=a; o.textContent=a; $("f-air").appendChild(o); });
    cabins.forEach(function(c){ var o=document.createElement("option"); o.value=c; o.textContent=c; $("f-cabin").appendChild(o); });
  }

  function load(){
    fetch("results.json?t="+Date.now()).then(function(r){ return r.json(); }).then(function(d){
      DATA=d; ALL=d.results||[];
      $("sub").textContent="最後更新 "+fmtTime(d.updated)+" · 共 "+ALL.length+" 筆監控";
      var navail=ALL.filter(function(r){return r.status==="available";}).length;
      $("summary").innerHTML=
        '<div class="stat">監控項目 <b>'+ALL.length+'</b></div>'+
        '<div class="stat ok">有位 <b>'+navail+'</b></div>';
      fillFilters(); render();
    }).catch(function(e){
      $("list").innerHTML='<p class="msg">載入 results.json 失敗：'+esc(e.message)+'</p>';
    });
  }
  ["f-air","f-cabin","f-availonly"].forEach(function(id){ $(id).addEventListener("change", render); });
  load();
})();
</script>
</body>
</html>
